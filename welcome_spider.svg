<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">\n<defs>\n
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#58a6ff" />
        <stop offset="50%" stop-color="#79c0ff" />
        <stop offset="100%" stop-color="#c9d1d9" />
    </linearGradient>
\n</defs>\n<style>\n
    .title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        font-size: 28px;
        font-weight: 800;
    }
    .web-line {
        stroke: rgba(255, 255, 255, 0.7);
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
    }
    .spider {
        animation: crawl 8s infinite ease-in-out;
        transform-origin: 0 0;
    }
    .spider-string {
        stroke: rgba(255, 255, 255, 0.8);
        stroke-width: 1.5;
        animation: string-extend 8s infinite ease-in-out;
        transform-origin: 0 0;
    }
    
    @keyframes crawl {
        0%, 100% { transform: translateY(-80px); }
        20%, 80% { transform: translateY(40px); }
        30%, 50%, 70% { transform: translateY(45px); }
        40%, 60% { transform: translateY(38px); }
    }
    @keyframes string-extend {
        0%, 100% { transform: scaleY(0); }
        20%, 80% { transform: scaleY(1.5); }
        30%, 50%, 70% { transform: scaleY(1.6); }
        40%, 60% { transform: scaleY(1.4); }
    }
    .leg-anim { animation: wiggle 0.5s infinite alternate linear; transform-origin: 0 65px; }
    @keyframes wiggle {
        0% { transform: rotate(-3deg); }
        100% { transform: rotate(3deg); }
    }
\n</style>\n<text x="400" y="65" text-anchor="middle" alignment-baseline="middle" class="title" fill="url(#textGrad)">🚀 Architecting Robust AI &amp; Security Solutions</text>\n
<g class="web-line">
    <path d="M 0 0 L 120 0 M 0 0 L 100 40 M 0 0 L 60 80 M 0 0 L 20 110 M 0 0 L 0 120" />
    <path d="M 40 0 Q 35 15 10 30 M 70 0 Q 60 25 20 60 M 100 0 Q 80 40 30 90 M 120 0 Q 90 60 0 110" />
</g>
\n
<g class="web-line" transform="translate(800, 0) scale(-1, 1)">
    <path d="M 0 0 L 120 0 M 0 0 L 100 40 M 0 0 L 60 80 M 0 0 L 20 110 M 0 0 L 0 120" />
    <path d="M 40 0 Q 35 15 10 30 M 70 0 Q 60 25 20 60 M 100 0 Q 80 40 30 90 M 120 0 Q 90 60 0 110" />
</g>
\n
<g transform="translate(720, 0)">
    <!-- String -->
    <line x1="0" y1="0" x2="0" y2="60" class="spider-string" />
    
    <!-- Spider Body -->
    <g class="spider">
        <g class="leg-anim">
            <!-- Left legs (Blue Spidey Legs) -->
            <path d="M -5 62 Q -15 50 -20 60 M -5 65 Q -15 60 -22 70 M -5 68 Q -15 70 -18 80 M -5 71 Q -10 75 -12 85" stroke="#0d47a1" stroke-width="2" fill="none" stroke-linecap="round"/>
            <!-- Right legs (Blue Spidey Legs) -->
            <path d="M 5 62 Q 15 50 20 60 M 5 65 Q 15 60 22 70 M 5 68 Q 15 70 18 80 M 5 71 Q 10 75 12 85" stroke="#0d47a1" stroke-width="2" fill="none" stroke-linecap="round"/>
        </g>
        
        <!-- Abdomen -->
        <ellipse cx="0" cy="74" rx="10" ry="12" fill="#cc0000" stroke="#7a0000" stroke-width="1.5" />
        <!-- Cephalothorax -->
        <circle cx="0" cy="62" r="7" fill="#cc0000" stroke="#7a0000" stroke-width="1.5" />
        
        <!-- Spidey Eyes -->
        <path d="M -5,60 Q -2,56 0,62 Q -2,65 -5,60 Z" fill="white" stroke="black" stroke-width="1" />
        <path d="M 5,60 Q 2,56 0,62 Q 2,65 5,60 Z" fill="white" stroke="black" stroke-width="1" />
        
        <!-- Spider logo on back -->
        <line x1="-3" y1="72" x2="3" y2="76" stroke="black" stroke-width="1" />
        <line x1="-3" y1="76" x2="3" y2="72" stroke="black" stroke-width="1" />
        <line x1="0" y1="70" x2="0" y2="78" stroke="black" stroke-width="1.5" />
    </g>
</g>
\n</svg>